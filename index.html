<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PsycheResearch Studio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body{
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,#667eea,#764ba2);
color:#1e293b;
padding:20px;
}

.container{max-width:1300px;margin:auto;}

.card{
background:white;
border-radius:20px;
padding:20px;
margin-bottom:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h2,h3{margin-bottom:10px;}

textarea,select{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ddd;
margin-top:5px;
}

button{
background:linear-gradient(135deg,#3b82f6,#8b5cf6);
color:white;
border:none;
padding:12px 18px;
border-radius:12px;
cursor:pointer;
margin-top:10px;
font-weight:600;
}

button:hover{transform:translateY(-2px);}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

.stat{
background:#f8fafc;
padding:12px;
border-radius:12px;
}

.chat{
background:#ecfeff;
padding:15px;
border-radius:12px;
margin-top:10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:8px;
border-bottom:1px solid #e2e8f0;
text-align:center;
}

canvas{max-height:280px;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h2>🧠 PsycheResearch Studio</h2>
<textarea id="dataInput" placeholder="study,score,stress&#10;5,70,3"></textarea>
<button onclick="loadData()">Load Data</button>
</div>

<div class="card">
<h3>Variables</h3>
<div id="xVars"></div>
<select id="yVar"></select>
<button onclick="runAnalysis()">Run Full Analysis</button>
</div>

<div class="card">
<h3>📊 Descriptive Statistics</h3>
<div id="stats" class="grid"></div>
</div>

<div class="card">
<h3>🔗 Correlation Matrix</h3>
<div id="corr"></div>
</div>

<div class="card">
<h3>🤖 Interpretation</h3>
<div id="chat"></div>
</div>

<div class="card">
<h3>📐 Regression Table</h3>
<div id="regTable"></div>
</div>

<div class="card">
<h3>📈 Charts</h3>
<canvas id="scatter"></canvas>
<canvas id="histX"></canvas>
<canvas id="histY"></canvas>
<canvas id="residual"></canvas>
</div>

</div>

<script>

let data=[], chart1,chart2,chart3,chart4;

function loadData(){
Papa.parse(document.getElementById('dataInput').value,{
header:true,dynamicTyping:true,
complete:res=>{
data=res.data.filter(r=>Object.values(r).length);
setup();
}});
}

function setup(){
let cols=Object.keys(data[0]);
let xHTML='', ySel=document.getElementById('yVar');
ySel.innerHTML='';
cols.forEach(c=>{
xHTML+=`<label><input type="checkbox" value="${c}"> ${c}</label><br>`;
ySel.add(new Option(c,c));
});
document.getElementById('xVars').innerHTML=xHTML;
}

function getNumeric(col){
return data.map(r=>r[col]).filter(v=>typeof v==='number');
}

// ---------- STATS ----------
function descriptive(){
let cols=Object.keys(data[0]);
let html='';
cols.forEach(c=>{
let vals=getNumeric(c);
if(!vals.length) return;
let mean=vals.reduce((a,b)=>a+b)/vals.length;
let sd=Math.sqrt(vals.reduce((s,v)=>s+(v-mean)**2,0)/(vals.length-1));
html+=`
<div class="stat">
<b>${c}</b><br>
Mean: ${mean.toFixed(2)}<br>
SD: ${sd.toFixed(2)}<br>
Min: ${Math.min(...vals)}<br>
Max: ${Math.max(...vals)}<br>
N: ${vals.length}
</div>`;
});
document.getElementById('stats').innerHTML=html;
}

// ---------- CORR ----------
function corr(){
let cols=Object.keys(data[0]);
let html='<table><tr><th></th>';
cols.forEach(c=>html+=`<th>${c}</th>`);
html+='</tr>';

cols.forEach(c1=>{
html+=`<tr><td><b>${c1}</b></td>`;
cols.forEach(c2=>{
let v1=getNumeric(c1), v2=getNumeric(c2);
let n=Math.min(v1.length,v2.length);
let r=0;
if(n>1){
let m1=v1.reduce((a,b)=>a+b)/n;
let m2=v2.reduce((a,b)=>a+b)/n;
let num=0,den1=0,den2=0;
for(let i=0;i<n;i++){
num+=(v1[i]-m1)*(v2[i]-m2);
den1+=(v1[i]-m1)**2;
den2+=(v2[i]-m2)**2;
}
r=num/Math.sqrt(den1*den2);
}
html+=`<td>${r.toFixed(2)}</td>`;
});
html+='</tr>';
});

html+='</table>';
document.getElementById('corr').innerHTML=html;
}

// ---------- REGRESSION ----------
function runAnalysis(){

descriptive();
corr();

let y=document.getElementById('yVar').value;
let xVars=[...document.querySelectorAll('#xVars input:checked')].map(x=>x.value);

if(!xVars.length) return;

let X=data.map(r=>[1,...xVars.map(v=>r[v])]);
let Y=data.map(r=>r[y]);

let B=[0,0];
let x=X.map(r=>r[1]);
let yVals=Y;

let n=yVals.length;
let sumX=x.reduce((a,b)=>a+b);
let sumY=yVals.reduce((a,b)=>a+b);
let sumXY=x.reduce((s,v,i)=>s+v*yVals[i],0);
let sumX2=x.reduce((s,v)=>s+v*v,0);

let slope=(n*sumXY-sumX*sumY)/(n*sumX2-sumX*sumX);
let intercept=(sumY-slope*sumX)/n;

let preds=x.map(v=>intercept+slope*v);

let mean=yVals.reduce((a,b)=>a+b)/n;
let ssRes=yVals.reduce((s,v,i)=>s+(v-preds[i])**2,0);
let ssTot=yVals.reduce((s,v)=>s+(v-mean)**2,0);
let r2=1-ssRes/ssTot;

// CHAT
document.getElementById('chat').innerHTML=
`<div class="chat">
Model explains ${(r2*100).toFixed(1)}% variance.<br>
Relationship is ${slope>0?"positive":"negative"}.
</div>`;

// TABLE
document.getElementById('regTable').innerHTML=
`<table>
<tr><th>Intercept</th><th>Slope</th></tr>
<tr><td>${intercept.toFixed(2)}</td><td>${slope.toFixed(2)}</td></tr>
</table>`;

// CHARTS
drawCharts(x,yVals,preds);
}

// ---------- CHARTS ----------
function drawCharts(x,y,preds){

if(chart1) chart1.destroy();
if(chart2) chart2.destroy();
if(chart3) chart3.destroy();
if(chart4) chart4.destroy();

chart1=new Chart(scatter,{
type:'scatter',
data:{
datasets:[
{data:x.map((v,i)=>({x:v,y:y[i]}))},
{type:'line',data:[
{x:Math.min(...x),y:Math.min(...preds)},
{x:Math.max(...x),y:Math.max(...preds)}
]}
]
}
});

chart2=new Chart(histX,{
type:'bar',
data:{labels:x,data:x}
});

chart3=new Chart(histY,{
type:'bar',
data:{labels:y,data:y}
});

chart4=new Chart(residual,{
type:'scatter',
data:{datasets:[{
data:x.map((v,i)=>({x:preds[i],y:y[i]-preds[i]}))
}]}
});
}

</script>
</body>
</html>
