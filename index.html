<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PsycheResearch Clinical Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}
.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
    margin-top:20px;
}
textarea,select,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:10px;
}
button{
    background:#6366f1;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<h1>🧪 PsycheResearch Clinical Pro</h1>

<div class="card">
<textarea id="dataInput">
disease,age,bmi,smoking
1,45,28,1
0,30,22,0
1,50,31,1
0,25,20,0
</textarea>

<select id="yVar"></select>
<select id="xVars" multiple></select>

<button onclick="loadData()">Run Analysis</button>
<button onclick="generatePDF()">📄 Export PDF</button>
</div>

<div class="card">
<h3>🔬 Logistic Regression</h3>
<div id="logistic"></div>
</div>

<div class="card">
<h3>📉 Confidence Intervals & p-values</h3>
<div id="stats"></div>
</div>

<div class="card">
<h3>🧠 Chapter 4 Auto Writer</h3>
<div id="chapter"></div>
</div>

<script>
let data=[];

function loadData(){
    Papa.parse(document.getElementById("dataInput").value,{
        header:true,
        dynamicTyping:true,
        complete: res=>{
            data = res.data.filter(r=>Object.values(r).length>0);
            setup();
        }
    });
}

function setup(){
    let cols=Object.keys(data[0]);
    let y=document.getElementById("yVar");
    let x=document.getElementById("xVars");

    y.innerHTML=""; x.innerHTML="";

    cols.forEach(c=>{
        y.innerHTML+=`<option>${c}</option>`;
        x.innerHTML+=`<option>${c}</option>`;
    });

    runAnalysis();
}

// sigmoid
function sigmoid(z){return 1/(1+Math.exp(-z));}

// logistic regression (gradient descent)
function logisticRegression(Y,X,lr=0.01,iter=500){
    let weights=new Array(X[0].length).fill(0);

    for(let k=0;k<iter;k++){
        for(let i=0;i<Y.length;i++){
            let z=0;
            for(let j=0;j<weights.length;j++){
                z+=weights[j]*X[i][j];
            }
            let pred=sigmoid(z);
            for(let j=0;j<weights.length;j++){
                weights[j]+=lr*(Y[i]-pred)*X[i][j];
            }
        }
    }
    return weights;
}

// normal approximation p-value
function pValue(z){
    return Math.exp(-0.717*z - 0.416*z*z);
}

function runAnalysis(){

    let yVar=document.getElementById("yVar").value;
    let xVars=[...document.getElementById("xVars").selectedOptions].map(o=>o.value);

    let Y=data.map(r=>r[yVar]);

    let X=data.map(r=>{
        return xVars.map(v=>r[v]);
    });

    let weights=logisticRegression(Y,X);

    let output="";
    let statText="";

    weights.forEach((w,i)=>{
        let OR=Math.exp(w);
        let ciLow=Math.exp(w-1.96);
        let ciHigh=Math.exp(w+1.96);
        let z=w/1;
        let p=pValue(Math.abs(z));

        output+=`<b>${xVars[i]}</b>: β=${w.toFixed(3)}, OR=${OR.toFixed(3)}<br>`;
        statText+=`${xVars[i]} → 95% CI [${ciLow.toFixed(2)}, ${ciHigh.toFixed(2)}], p≈${p.toFixed(3)}<br>`;
    });

    document.getElementById("logistic").innerHTML=output;
    document.getElementById("stats").innerHTML=statText;

    generateChapter(yVar,xVars,weights);
}

function generateChapter(y,xVars,weights){

    let text = `
    <h4>CHAPTER FOUR: RESULTS AND DISCUSSION</h4>

    This study examined the relationship between ${xVars.join(", ")} and ${y}. 
    Logistic regression analysis was conducted.

    The findings revealed that ${xVars.map((v,i)=>`${v} (β=${weights[i].toFixed(2)})`).join(", ")} 
    were predictors of ${y}.

    The odds ratios indicate the likelihood of the outcome occurring given changes in predictors.

    These findings suggest clinical relevance in understanding how these variables influence ${y}. 
    This aligns with existing literature and supports the study hypothesis.

    In conclusion, the predictors demonstrate significant associations and should be considered in 
    healthcare decision-making.
    `;

    document.getElementById("chapter").innerHTML=text;
}

// PDF export
function generatePDF(){
    const { jsPDF } = window.jspdf;
    let doc=new jsPDF();

    let text=document.getElementById("chapter").innerText;

    doc.text(text,10,10);
    doc.save("research_report.pdf");
}

loadData();
</script>

</body>
</html>
