<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PsycheResearch Ultimate</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    padding:20px;
}
.container{max-width:1200px;margin:auto;}
.card{background:#1e293b;padding:20px;border-radius:15px;margin-top:20px;}
textarea,select,button{width:100%;padding:10px;margin-top:10px;border-radius:10px;border:none;}
button{background:#6366f1;color:white;font-weight:bold;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px;}
.stat{background:#020617;padding:10px;border-radius:10px;}
</style>
</head>

<body>
<div class="container">

<h1>📊 PsycheResearch Ultimate</h1>

<div class="card">
<textarea id="dataInput">
study_hours,exam_score,anxiety
5,68,4
7,78,3
3,55,7
8,85,2
</textarea>

<select id="yVar"></select>
<select id="xVars" multiple></select>

<button onclick="loadData()">Run Full Analysis</button>
</div>

<div class="card">
<h3>📈 Descriptive Stats</h3>
<div id="stats" class="grid"></div>
</div>

<div class="card">
<h3>📐 Multiple Regression</h3>
<div id="regression"></div>
</div>

<div class="card">
<h3>📉 Hypothesis Testing</h3>
<div id="tests"></div>
</div>

<div class="card">
<h3>🧠 AI Chapter 4 Interpretation</h3>
<div id="ai"></div>
</div>

<canvas id="chart"></canvas>

</div>

<script>
let data=[];

function loadData(){
    Papa.parse(document.getElementById("dataInput").value,{
        header:true,
        dynamicTyping:true,
        complete: res=>{
            data = res.data.filter(r=>Object.values(r).length>0);
            setup();
        }
    });
}

function setup(){
    let cols = Object.keys(data[0]);

    let ySel=document.getElementById("yVar");
    let xSel=document.getElementById("xVars");

    ySel.innerHTML="";
    xSel.innerHTML="";

    cols.forEach(c=>{
        ySel.innerHTML+=`<option>${c}</option>`;
        xSel.innerHTML+=`<option>${c}</option>`;
    });

    runAnalysis();
}

function mean(arr){return arr.reduce((a,b)=>a+b,0)/arr.length;}

function sd(arr){
    let m=mean(arr);
    return Math.sqrt(arr.reduce((a,b)=>a+(b-m)**2,0)/(arr.length-1));
}

// MULTIPLE REGRESSION (basic matrix-free approximation)
function multipleRegression(Y, Xs){
    let n=Y.length;
    let k=Xs.length;

    let betas = [];

    for(let j=0;j<k;j++){
        let X = Xs[j];
        let num=0,den=0;
        for(let i=0;i<n;i++){
            num+=X[i]*Y[i];
            den+=X[i]*X[i];
        }
        betas.push(num/den);
    }

    return betas;
}

// t-test
function tTest(a,b){
    let m1=mean(a), m2=mean(b);
    let s1=sd(a), s2=sd(b);
    let n1=a.length, n2=b.length;

    let t=(m1-m2)/Math.sqrt((s1**2/n1)+(s2**2/n2));
    return t;
}

// ANOVA (simple)
function anova(groups){
    let all = groups.flat();
    let grandMean = mean(all);

    let ssBetween=0, ssWithin=0;

    groups.forEach(g=>{
        let m=mean(g);
        ssBetween+=g.length*(m-grandMean)**2;
        g.forEach(v=>{
            ssWithin+=(v-m)**2;
        });
    });

    let dfB=groups.length-1;
    let dfW=all.length-groups.length;

    let msB=ssBetween/dfB;
    let msW=ssWithin/dfW;

    return msB/msW;
}

function runAnalysis(){

    let yVar=document.getElementById("yVar").value;
    let xVars=[...document.getElementById("xVars").selectedOptions].map(o=>o.value);

    let Y=data.map(r=>r[yVar]).filter(v=>!isNaN(v));

    let Xs=xVars.map(x=>data.map(r=>r[x]).filter(v=>!isNaN(v)));

    // stats
    document.getElementById("stats").innerHTML=
        `<div class="stat">Mean(${yVar})=${mean(Y).toFixed(2)}</div>
         <div class="stat">SD=${sd(Y).toFixed(2)}</div>`;

    // regression
    let betas = multipleRegression(Y,Xs);

    let regText = yVar+" = ";
    betas.forEach((b,i)=>{
        regText += `${b.toFixed(2)}(${xVars[i]}) + `;
    });

    document.getElementById("regression").innerHTML=regText;

    // tests
    let t = tTest(Y.slice(0,2),Y.slice(2,4));
    let f = anova([Y.slice(0,2),Y.slice(2,4)]);

    document.getElementById("tests").innerHTML=
    `t-test ≈ ${t.toFixed(2)}<br>ANOVA F ≈ ${f.toFixed(2)}`;

    // AI interpretation
    let insight = betas.some(b=>b>0) ? "positive influence" : "negative influence";

    document.getElementById("ai").innerHTML=
    `The regression model indicates that the predictors (${xVars.join(", ")}) 
    collectively influence ${yVar}. 

    The relationship suggests a ${insight} on the outcome variable. 
    The statistical tests (t ≈ ${t.toFixed(2)}, F ≈ ${f.toFixed(2)}) 
    provide evidence to support hypothesis testing. 

    This implies that these variables are significant contributors 
    and should be discussed in Chapter 4 as key determinants.`;

    drawChart(Y);
}

function drawChart(Y){
    new Chart(document.getElementById("chart"),{
        type:"bar",
        data:{
            labels:Y.map((_,i)=>i+1),
            datasets:[{label:"Y values",data:Y}]
        }
    });
}

loadData();
</script>

</body>
</html>
