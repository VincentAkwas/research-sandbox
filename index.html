<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PsycheResearch Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#1e293b,#0f172a);
    color: white;
    margin:0;
    padding:20px;
}

.container {
    max-width: 1300px;
    margin:auto;
}

h1 {
    text-align:center;
    background: linear-gradient(90deg,#38bdf8,#a78bfa);
    -webkit-background-clip: text;
    color: transparent;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

input, select, textarea {
    width:100%;
    padding:10px;
    border-radius:10px;
    border:none;
    margin-top:5px;
}

button {
    background: linear-gradient(135deg,#6366f1,#ec4899);
    border:none;
    padding:12px;
    border-radius:12px;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.stat {
    background:#020617;
    padding:10px;
    border-radius:12px;
}

.chart {
    background:white;
    border-radius:20px;
    padding:10px;
}

.interpret {
    background:#020617;
    padding:15px;
    border-left:5px solid #38bdf8;
    border-radius:10px;
}
</style>
</head>

<body>
<div class="container">

<h1>📊 PsycheResearch Pro</h1>

<div class="card">
<textarea id="dataInput" rows="4">
study_hours,exam_score,anxiety
5,68,4
7,78,3
3,55,7
8,85,2
</textarea>

<select id="xVar"></select>
<select id="yVar"></select>

<button onclick="loadData()">Run Full Analysis</button>
</div>

<div class="card">
<h3>📈 Descriptive Statistics</h3>
<div id="stats" class="grid"></div>
</div>

<div class="card">
<h3>📐 Regression</h3>
<div id="regression"></div>
</div>

<div class="card">
<h3>🧠 Smart Interpretation (Thesis Ready)</h3>
<div id="interpretation" class="interpret"></div>
</div>

<div class="card chart">
<canvas id="chart"></canvas>
</div>

</div>

<script>
let data = [];
let chart;

function loadData(){
    const raw = document.getElementById("dataInput").value;

    Papa.parse(raw,{
        header:true,
        dynamicTyping:true,
        complete: function(res){
            data = res.data.filter(r=>Object.values(r).length>0);
            setup();
        }
    });
}

function setup(){
    const cols = Object.keys(data[0]);
    const xSel = document.getElementById("xVar");
    const ySel = document.getElementById("yVar");

    xSel.innerHTML="";
    ySel.innerHTML="";

    cols.forEach(c=>{
        xSel.innerHTML += `<option>${c}</option>`;
        ySel.innerHTML += `<option>${c}</option>`;
    });

    runAnalysis();
}

function runAnalysis(){
    let x = document.getElementById("xVar").value;
    let y = document.getElementById("yVar").value;

    let valsX = data.map(r=>r[x]).filter(v=>!isNaN(v));
    let valsY = data.map(r=>r[y]).filter(v=>!isNaN(v));

    let mean = valsX.reduce((a,b)=>a+b,0)/valsX.length;

    document.getElementById("stats").innerHTML = `
    <div class="stat">Mean (${x}) = ${mean.toFixed(2)}</div>
    <div class="stat">N = ${valsX.length}</div>
    `;

    // regression
    let n = valsX.length;
    let sumX=0,sumY=0,sumXY=0,sumX2=0;

    for(let i=0;i<n;i++){
        sumX+=valsX[i];
        sumY+=valsY[i];
        sumXY+=valsX[i]*valsY[i];
        sumX2+=valsX[i]*valsX[i];
    }

    let slope = (n*sumXY - sumX*sumY)/(n*sumX2 - sumX*sumX);
    let intercept = (sumY - slope*sumX)/n;

    document.getElementById("regression").innerHTML =
    `${y} = ${intercept.toFixed(2)} + ${slope.toFixed(2)}(${x})`;

    // smart interpretation
    let insight = slope > 0 ?
    "There is a positive relationship: as X increases, Y increases."
    :
    "There is a negative relationship: as X increases, Y decreases.";

    document.getElementById("interpretation").innerHTML = `
    This analysis shows that <b>${x}</b> predicts <b>${y}</b>.<br><br>
    ${insight}<br><br>
    This implies that in your research context, changes in <b>${x}</b>
    significantly influence <b>${y}</b>, making it suitable for hypothesis discussion.
    `;

    // chart
    if(chart) chart.destroy();

    chart = new Chart(document.getElementById("chart"),{
        type:'scatter',
        data:{
            datasets:[{
                label:"Data",
                data: valsX.map((v,i)=>({x:v,y:valsY[i]}))
            }]
        }
    });
}

loadData();
</script>
</body>
</html>
